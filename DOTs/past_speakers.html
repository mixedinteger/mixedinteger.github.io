<!DOCTYPE html>
<html lang="en">
<head>

  <!-- Basic Page Needs
  –––––––––––––––––––––––––––––––––––––––––––––––––– -->
  <meta charset="utf-8">
  <title>Mixed Integer Programming European Workshop 2026</title>
  <meta name="description" content="">
  <meta name="author" content="">

  <!-- Mobile Specific Metas
  –––––––––––––––––––––––––––––––––––––––––––––––––– -->
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- FONT
  –––––––––––––––––––––––––––––––––––––––––––––––––– -->
  <link href="//fonts.googleapis.com/css?family=Raleway:400,300,600" rel="stylesheet" type="text/css">

  <!-- CSS
  –––––––––––––––––––––––––––––––––––––––––––––––––– -->
  <link rel="stylesheet" href="css/normalize.css">
  <link rel="stylesheet" href="css/skeleton.css">
  <link rel="stylesheet" href="css/colors.css">

  <!-- Favicon
  –––––––––––––––––––––––––––––––––––––––––––––––––– -->
  <link rel="icon" type="image/png" href="../img/favicon.png">

  <style>  
    .topnav {
      overflow: hidden;
      background-color: var(--navbar);
    }
    
    .topnav a {
      float: left;
      color: var(--navbartext);
      text-align: center;
      padding: 14px 16px;
      text-decoration: none;
      font-size: 17px;
    }
    
    .topnav a:hover {
      background-color: var(--navbarselect);
      color: var(--navbarselecttext);
    }
    
    .topnav a.active {
      background-color: var(--navbarselect);
      color: var(--navbarselecttext);
    }
  </style>

  <style>
    .highlight {
	background-color: var(--highlight);
	color: var(--highlightext);
    }

    .highlight a {
	color: var(--highlightlink);
    }
  </style>

  <style>
    .mainstyle1 {
	background-color: var(--maincolor1);
	color: var(--maincolor1text);
    }

    .mainstyle1 a {
	color: var(--maincolor1link);
    }
  </style>
  
  <style>
    .mainstyle2 {
	background-color: var(--maincolor2);
	color: var(--maincolor2text);
    }

    .mainstyle2 a {
	color: var(--maincolor2link);
    }
  </style>

</head>
<body>

  <!-- Primary Page Layout
  –––––––––––––––––––––––––––––––––––––––––––––––––– -->
  <div class="firstrow">
    <div class="container">
      <div class="row">
        <div class="six columns"><img src="../img/mip-logo-plain.png" alt="MIP Logo" width="100%"></div>
        <div class="six columns">
          <h2>Discrete Optimization Talks</h2>
          <p class="date">A virtual seminar series from the</p>
          <p class="place">Mixed Integer Programming Society</p>
        </div>
      </div>
    </div>
  </div>

  <div style="background-color:var(--navbar);color:var(--navbartext)">
    <div class="container">
      <div class="topnav">
        <a href="index.html">Home</a>
        <a class="active" href="past_speakers.html">Past Speakers</a>
      </div>
    </div>
  </div>

  <!---- needed for showing abstracts ------------------------------ -->

  <div id="abstract-modal" style="
				  display:none; 
				  position: fixed; 
				  top: 0; left: 0;
				  width:100%; height:100%;
				  background: rgba(0,0,0,0.6);
				  justify-content: center;
				  align-items: center;
				  z-index: 9999;
				  ">
    <div id="abstract-content" style="
				      background: white;
				      max-width: 600px;
				      padding: 20px;
				      border-radius: 8px;
				      font-size: 1.5rem;
				      ">
      <button id="close-modal" style="
				      float:right;
				      padding:4px 8px;
				      cursor:pointer;
				      ">✖</button>

      <h3 id="abstract-title"></h3>
      <p id="abstract-text"></p>
    </div>
  </div>
  
  <!-- include talsk -->
  <div class="mainstyle2">
    <div class="container">
      <h2>Past Speakers</h2>
      <div class="row">
	<div class="six columns" id="past">
	</div>
      </div>
    </div>
  </div>

  <script type="module" src="./js/select_past_speakers.js"></script>

  <div class="mainstyle1">
    <div class="container">
      <h2>Credits</h2>
      <p>Logo-Design by ©<a href="https://www.jubs-art.com">Julia Silbermann</a> (Font-Credits: Cornerstone, by Zac Freeland).
      Website hosted at <a href="https://pages.github.com">GitHub Pages</a>, layout based on <a href="http://getskeleton.com">skeleton</a> using <a href="https://github.com/impallari/Raleway">Raleway</a> font</p>
    </div>
  </div>

<!-- End Document
  –––––––––––––––––––––––––––––––––––––––––––––––––– -->
  <script>
    function toggleSchedule(el) {
      el.parentElement.nextElementSibling.classList.toggle("hideme");
    }

    function toggleAbstract(el) {
      el.parentElement.nextElementSibling.classList.toggle("hideme");
    }
  </script>
</body>
</html>
